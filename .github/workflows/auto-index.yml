name: Auto Generate Index Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - "garage/**"
      - "reading_room/**"
      - "cv/**"
      - "index.md"
      - "navigator.md"
      - "scripts/generate_indexes.py"
      - "scripts/generate_page_dates.py"
      - "scripts/generate_sidebar.py"
      - "!**/index.md"
  schedule:
    # Run daily at 02:00 UTC as a safety net for any missed triggers
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect new directories
        id: new-dirs
        run: |
          # List directories under garage/ and reading_room/ that have no index.md.
          # This step is informational only and must not fail the workflow.
          MISSING=$(
            {
              for base in garage reading_room; do
                if [ -d "$base" ]; then
                  find "$base" -type d
                fi
              done
            } | while IFS= read -r d; do
              if [ ! -f "$d/index.md" ]; then
                echo "$d"
              fi
            done
          ) || true
          if [ -n "$MISSING" ]; then
            echo "Found directories without index.md:"
            echo "$MISSING"
          else
            echo "No directories without index.md found."
          fi

      - name: Generate index pages
        run: python scripts/generate_indexes.py --roots garage reading_room

      - name: Generate sidebar tree
        run: python scripts/generate_sidebar.py --roots garage reading_room

      - name: Generate page creation dates
        run: python scripts/generate_page_dates.py

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: auto-generate index pages"
            git push
          else
            echo "No index changes to commit."
          fi
