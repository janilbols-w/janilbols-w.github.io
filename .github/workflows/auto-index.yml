name: Auto Generate Index Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - "**/*.md"
      - "**/*.drawio"
    paths-ignore:
      - "**/index.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate index pages
        run: python scripts/generate_indexes.py --roots garage reading_room

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: auto-generate index pages"
            git push
          else
            echo "No index changes to commit."
          fi
