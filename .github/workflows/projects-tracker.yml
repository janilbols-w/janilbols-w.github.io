name: Track GitHub Projects

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

concurrency:
  group: projects-tracker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-projects:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate projects tracker page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_projects_activity.py

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain projects/index.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add projects/index.md
            git commit -m "chore: auto-update projects tracker"
            git push
          else
            echo "No projects updates to commit."
          fi
