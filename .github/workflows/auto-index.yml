name: Auto Generate Index Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - "garage/**"
      - "reading_room/**"
      - "scripts/generate_indexes.py"
      - "!**/index.md"
  schedule:
    # Run daily at 02:00 UTC as a safety net for any missed triggers
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect new directories
        id: new-dirs
        run: |
          # List directories under garage/ and reading_room/ that have no index.md
          MISSING=$(find garage reading_room -type d | while read d; do
            [ ! -f "$d/index.md" ] && echo "$d"
          done)
          if [ -n "$MISSING" ]; then
            echo "Found directories without index.md:"
            echo "$MISSING"
          fi

      - name: Generate index pages
        run: python scripts/generate_indexes.py --roots garage reading_room

      - name: Generate sidebar tree
        run: python scripts/generate_sidebar.py --roots garage reading_room

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: auto-generate index pages"
            git push
          else
            echo "No index changes to commit."
          fi
